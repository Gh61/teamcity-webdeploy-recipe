name: gh61_tc/webdeploy
title: Web Deploy
version: 1.0.1
description: >-
  Deploys the output of dotnet publish to an IIS site using msdeploy (Web Deploy).
  Supports skipping the App_Data folder during deployment (same behavior as .NET Framework WebDeploy)
  and optionally setting write permissions on App_Data for the IIS application pool identity.

inputs:
  - sourcePath:
      type: text
      label: Source path
      description: 'Path to the published output. Default: %teamcity.build.checkoutDir%\publish'
      default: "%teamcity.build.checkoutDir%\\publish"
      required: true

  - siteName:
      type: text
      label: IIS site name
      description: "Example: MySite or Default Web Site/MyApp"
      required: true

  - url:
      type: text
      label: Web Deploy URL
      description: "Example: https://server.example.com:8172/msdeploy.axd"
      required: true

  - username:
      type: text
      label: Username
      description: 'Web Deploy username. Example: %PublishUser%'
      required: true

  - password:
      type: password
      label: Password
      description: 'Web Deploy password. Use a secret parameter, example: %PublishPassword%'
      required: true

  - skipAppData:
      type: boolean
      label: Skip App_Data
      description: "If enabled, App_Data folder and its content on destination will not be deleted during deploy (same behavior as .NET Framework WebDeploy)"
      default: "true"

  - setAppDataPermissions:
      type: boolean
      label: Set App_Data permissions
      description: "If enabled, sets write permissions for the IIS application pool identity on the App_Data folder."
      default: "false"

steps:
  - name: Web Deploy
    script: |-
      where msdeploy.exe
      if errorlevel 1 exit /b 1

      set SKIP_APP_DATA=
      if "%skipAppData%"=="true" set SKIP_APP_DATA=-skip:skipAction=Delete,objectName=dirPath,absolutePath=App_Data -skip:skipAction=Delete,objectName=filePath,absolutePath=App_Data

      msdeploy.exe ^
        -verb:sync ^
        -source:contentPath="%sourcePath%" ^
        -dest:contentPath="%siteName%",computerName="%url%?site=%siteName%",userName="%username%",password="%password%",authType="Basic",includeAcls="False" ^
        -enableRule:AppOffline ^
        -allowUntrusted ^
        %SKIP_APP_DATA% ^
        -verbose
      if errorlevel 1 exit /b 1

      if "%setAppDataPermissions%"=="true" (
        msdeploy.exe ^
          -verb:sync ^
          -source:setAcl ^
          -dest:setAcl="%siteName%/App_Data",setAclAccess=Write,computerName="%url%?site=%siteName%",userName="%username%",password="%password%",authType="Basic" ^
          -allowUntrusted ^
          -verbose
        if errorlevel 1 exit /b 1
      )
